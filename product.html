<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Product | Malik Wears</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <div class="logo">

        <a href="index.html">

            <div class="logo-box">

                <div class="mw-logo">MW</div>

                <div>

                    <h1>MALIK WEARS</h1>

                    <span>Premium Pakistani Fashion</span>

                </div>

            </div>

        </a>

    </div>

    <nav>

        <ul>

            <li><a href="index.html#products">Collection</a></li>

            <li><a href="#">New Arrivals</a></li>

            <li><a href="#">Specials</a></li>

            <li><a href="cart.html">Cart 🛒</a></li>

            <li><a href="#contact">Contact</a></li>

        </ul>

    </nav>

</header>

<section class="product-page">

    <div class="product-image">

        <img id="mainImage" src="images/1.png">

    </div>

    <div class="product-info">

        <h1 id="productName">
            Emerald 3 Piece
        </h1>

        <h2 id="productPrice">
            Rs. 3499
        </h2>

       <p id="productDescription">

    Premium Pakistani embroidered 3 piece suit.

</p>

<br>

<h3 class="color-title">Available Colors</h3>
<div id="colorContainer" class="color-container">

</div>

<br>

        <label>Size</label>

        <select>

            <option>Small</option>

            <option>Medium</option>

            <option>Large</option>

            <option>XL</option>

        </select>

        <br><br>

        <h3>Quantity</h3>

<div class="quantity-box">

    <button id="minus">-</button>

    <input type="text" id="quantity" value="1" readonly>

    <button id="plus">+</button>

</div>

<br>
<button onclick="window.location.href='cart.html'">
    Go to Cart
</button>
<button class="cart-btn" id="addCart">Add To Cart</button>

<button class="buy-btn">Buy Now</button>
        

    </div>

</section>

<script src="products.js"></script>
<script src="script.js"></script>

</body>

</html>
